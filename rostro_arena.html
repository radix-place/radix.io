<style>
    :root {
      --sand-bg: #202522;
      --sand-fg: #f4f1e8;
      --sand-muted: rgba(244, 241, 232, 0.72);
      --sand-panel: rgba(32, 37, 34, 0.84);
      --sand-border: rgba(255, 255, 255, 0.16);
      --sand-accent: #a44f32;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;

      color: var(--sand-fg);
      font-family: var(--font-body);
      overflow-x: hidden;

        radial-gradient(circle at center, rgba(164, 79, 50, 0.08), transparent 38rem),

    }

    canvas {
      display: block;
      margin: 0 auto;
      max-width: min(94vw, 1280px);
      height: auto;

    .sand-ui {
      position: fixed;

      -webkit-backdrop-filter: blur(6px);

      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
    }

    .sand-title {
      margin: 0 0 8px 0;

    .sand-ui label {
      display: block;
      margin-top: 8px;
      color: var(--sand-muted);
      font-size: 0.76rem;
      line-height: 1.35;
    }

    .sand-ui input[type="range"] {
      width: 100%;
      accent-color: var(--sand-accent);
    }

    .sand-help {
      margin-top: 8px;

    .sand-back {
      position: fixed;
      top: 12px;

      z-index: 4;

      display: inline-flex;
      align-items: center;
      justify-content: center;

      padding: 10px 15px;

      color: var(--sand-fg);
      background: var(--sand-accent);

      border: 1px solid transparent;
      border-radius: 3px;

      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.05em;
      text-decoration: none;
      text-transform: uppercase;

      box-shadow: 0 8px 22px rgba(164, 79, 50, 0.22);

        transform 0.15s ease,

    .sand-back:hover {

<script src="https://cdn.jsdelivr.net/npm/p5@1.9.3/lib/p5.min.js"></script>
<!-- Versión fija para conservar la API clásica ml5.facemesh(...) -->
<script src="https://cdn.jsdelivr.net/npm/ml5@0.12.2/dist/ml5.min.js"></script>

<body><a class="skip-link" href="#contenido-principal">Ir al contenido principal</a>
<main aria-label="Rostro de arena con visión computacional" id="contenido-principal">
<h1 class="sand-screen-reader">Rostro de arena</h1>
<a class="sand-back" href="scripts.html">
      Volver a exploraciones
    </a>
<section aria-label="Controles de rostro de arena" class="sand-ui" id="ui">
<p class="sand-title">
        Rostro de arena
        <span class="sand-subtitle">p5.js + ml5 Facemesh · Fundación Radix</span>
</p>
<label for="rngGrain">
        Intensidad arena
        <input id="rngGrain" max="1" min="0" step="0.01" type="range" value="0.7"/>
</label>
<label for="rngDetail">
        Detalle rasgos
        <input id="rngDetail" max="1" min="0" step="0.01" type="range" value="0.55"/>
</label>
<label for="rngFeather">
        Suavizado borde
        <input id="rngFeather" max="40" min="2" step="1" type="range" value="16"/>
</label>
<label for="rngRes">
        Resolución interna
        <input id="rngRes" max="4" min="1" step="1" type="range" value="2"/>
</label>
<div class="sand-help">
        Teclas: <strong>V</strong> espejo · <strong>S</strong> guardar PNG.
        La página no incorpora subida de imágenes ni almacenamiento del video.
      </div>
</section>
<div aria-live="polite" class="sand-status" id="status" role="status">
      Inicializando cámara…
    </div>
</main>
<script>
    const W = 1280;
    const H = 720;

    const FACE_OVAL = [
      10, 338, 297, 332, 284, 251, 389, 356, 454,
      323, 361, 288, 397, 365, 379, 378, 400, 377,
      152, 148, 176, 149, 150, 136, 172, 58, 132,
      93, 234, 127, 162, 21, 54, 103, 67, 109
    ];

    let flipVideo = true;
    let capture;
    let facemesh;
    let predictions = [];

    let gSand;
    let gMask;
    let gVideoSmall;

    const ui = {};

    function setStatus(message) {
      const status = document.getElementById('status');
      if (status) status.textContent = message;
    }

    function setup() {
      createCanvas(W, H);
      pixelDensity(1);

      gSand = createGraphics(W, H);
      gSand.pixelDensity(1);

      gMask = createGraphics(W, H);
      gMask.pixelDensity(1);

      gVideoSmall = createGraphics(320, 180);
      gVideoSmall.pixelDensity(1);

      ui.grain = document.getElementById('rngGrain');
      ui.detail = document.getElementById('rngDetail');
      ui.feather = document.getElementById('rngFeather');
      ui.res = document.getElementById('rngRes');

      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        setStatus('La cámara no está disponible. Usa HTTPS, localhost o un navegador compatible.');
        noLoop();
        return;
      }

      capture = createCapture(
        {
          video: {
            facingMode: 'user',
            width: { ideal: W },
            height: { ideal: H }
          },
          audio: false
        },
        () => {
          setStatus('Cámara activa. Cargando modelo de rostro…');
        }
      );

      capture.size(W, H);
      capture.elt.setAttribute('playsinline', '');
      capture.hide();

      if (!window.ml5 || typeof ml5.facemesh !== 'function') {
        setStatus('No se pudo cargar ml5 Facemesh. Revisa la conexión o la versión de la librería.');
        noLoop();
        return;
      }

      facemesh = ml5.facemesh(
        capture,
        { maxFaces: 1 },
        () => {
          setStatus('Modelo cargado. Busca rostro…');
        }
      );

      facemesh.on('predict', results => {
        predictions = results || [];
      });
    }

    function draw() {
      background(0);

      const haveFace = predictions && predictions.length > 0;

      if (haveFace) {
        const face = predictions[0];
        const landmarks = face.scaledMesh;

        if (landmarks && landmarks.length > 0) {
          drawSandFace(landmarks);
        }
      }

      setStatus(haveFace ? 'Rostro detectado.' : 'Buscando rostro…');
    }

    function drawSandFace(landmarks) {
      const grainK = Number(ui.grain.value);
      const detailK = Number(ui.detail.value);
      const feather = Number(ui.feather.value);
      const scale = Number(ui.res.value);

      const poly = faceOvalPixels(landmarks, width, height, flipVideo);

      drawFaceMask(poly, feather);
      drawVideoSample();
      drawSandTexture(scale, grainK, detailK);

      const masked = gSand.get();
      masked.mask(gMask.get());

      image(masked, 0, 0, width, height);
    }

    function drawFaceMask(poly, feather) {
      gMask.clear();
      gMask.noStroke();

      gMask.fill(255, 255);
      gMask.beginShape();
      poly.forEach(point => gMask.vertex(point.x, point.y));
      gMask.endShape(CLOSE);

      const rings = Math.max(4, Math.min(16, Math.round(feather / 2)));

      for (let i = 1; i <= rings; i++) {
        const k = 1 + i * 0.018;
        const alpha = 255 * (1 - i / (rings + 1));

        gMask.fill(255, alpha);
        gMask.beginShape();
        polyScaled(poly, k).forEach(point => gMask.vertex(point.x, point.y));
        gMask.endShape(CLOSE);
      }
    }

    function drawVideoSample() {
      gVideoSmall.push();
      gVideoSmall.clear();

      if (flipVideo) {
        gVideoSmall.translate(gVideoSmall.width, 0);
        gVideoSmall.scale(-1, 1);
      }

      gVideoSmall.image(capture, 0, 0, gVideoSmall.width, gVideoSmall.height);
      gVideoSmall.pop();
    }

    function drawSandTexture(scale, grainK, detailK) {
      const sW = Math.floor(width / scale);
      const sH = Math.floor(height / scale);
      const t = frameCount * 0.01;

      gSand.clear();
      gSand.noStroke();

      for (let y = 0; y < sH; y++) {
        for (let x = 0; x < sW; x++) {
          const X = x * scale;
          const Y = y * scale;

          const sampleX = Math.floor((x * gVideoSmall.width) / sW);
          const sampleY = Math.floor((y * gVideoSmall.height) / sH);

          const color = gVideoSmall.get(sampleX, sampleY);

          const luminance = (
            0.299 * color[0] +
            0.587 * color[1] +
            0.114 * color[2]
          ) / 255;

          const shadow = 1 - luminance;

          const n =
            0.55 * noise(x * 0.015, y * 0.015, t) +
            0.30 * noise(x * 0.050, y * 0.050, t * 1.7) +
            0.15 * noise(x * 0.100, y * 0.100, t * 3.3);

          const relief = constrain(0.55 * shadow + detailK * 0.35 * n, 0, 1);
          const shade = 0.90 + 0.22 * (n - 0.5) - 0.18 * relief * grainK;
          const base = 198 + 30 * relief * grainK;

          let r = constrain(base + 16 * (n - 0.5) + 8 * (shadow - 0.5), 0, 255);
          let g = constrain(base - 18 + 10 * (n - 0.5) - 10 * relief, 0, 255);
          let b = constrain(base - 46 - 6 * relief, 0, 255);

          r = Math.round(r * shade);
          g = Math.round(g * shade);
          b = Math.round(b * shade);

          gSand.fill(r, g, b);
          gSand.rect(X, Y, scale, scale);
        }
      }
    }

    function keyPressed() {
      if (key === 's' || key === 'S') {
        saveCanvas('rostro-arena-radix', 'png');
      }

      if (key === 'v' || key === 'V') {
        flipVideo = !flipVideo;
      }
    }

    function faceOvalPixels(landmarks, canvasWidth, canvasHeight, flip) {
      const points = [];

      for (const index of FACE_OVAL) {
        const landmark = landmarks[index];

        if (!landmark) continue;

        const rawX = landmark[0] / W;
        const rawY = landmark[1] / H;

        const x = (flip ? 1 - rawX : rawX) * canvasWidth;
        const y = rawY * canvasHeight;

        points.push({ x, y });
      }

      return points;
    }

    function polyScaled(poly, k) {
      const center = centroid(poly);

      return poly.map(point => ({
        x: center.x + (point.x - center.x) * k,
        y: center.y + (point.y - center.y) * k
      }));
    }

    function centroid(poly) {
      let area = 0;
      let cx = 0;
      let cy = 0;

      for (let i = 0; i < poly.length; i++) {
        const p = poly[i];
        const q = poly[(i + 1) % poly.length];

        const cross = p.x * q.y - q.x * p.y;

        area += cross;
        cx += (p.x + q.x) * cross;
        cy += (p.y + q.y) * cross;
      }

      area *= 0.5;

      if (Math.abs(area) < 1e-6) {
        return {
          x: width / 2,
          y: height / 2
        };
      }

      return {
        x: cx / (6 * area),
        y: cy / (6 * area)
      };
    }
  </script>
</body>
